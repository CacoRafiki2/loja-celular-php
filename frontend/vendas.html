<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ordem de Serviço e Vendas</title>
</head>
<body>
    <h2>Nova Ordem de Serviço / Venda</h2>
    
    <form id="formVenda">
        <input type="hidden" name="acao" value="cadastrar">
        
        <label>Cliente:</label>
        <select name="cliente_id" id="selectCliente" required>
            <option value="">Carregando clientes...</option>
        </select><br><br>

        <label>Tipo:</label>
        <select name="tipo" id="selectTipo" onchange="mudarTipo()" required>
            <option value="">Selecione...</option>
            <option value="produto">Venda de Produto</option>
            <option value="servico">Ordem de Serviço (Manutenção)</option>
        </select><br><br>

        <label>Item:</label>
        <select name="item_id" id="selectItem" onchange="calcularTotal()" required disabled>
            <option value="">Selecione o tipo primeiro</option>
        </select><br><br>

        <label>Quantidade:</label>
        <input type="number" name="quantidade" id="quantidade" value="1" min="1" onchange="calcularTotal()" required><br><br>

        <label>Valor Total (R$):</label>
        <input type="text" name="valor_total" id="valor_total" readonly required><br><br>

        <button type="submit">Registrar</button>
    </form>

    <hr>
    <h2>Histórico de Registros</h2>
    <ul id="listaVendas"></ul>

    <script>
        let produtosGlobais = [];
        let servicosGlobais = [];

        // 1. CARREGAR DADOS AO ABRIR A PÁGINA
        window.onload = function() {
            // Carregar Clientes
            fetch('backend/api_clientes.php?acao=listar')
                .then(res => res.json())
                .then(dados => {
                    let select = document.getElementById('selectCliente');
                    select.innerHTML = '<option value="">Selecione um cliente</option>';
                    dados.forEach(c => select.innerHTML += `<option value="${c.id}">${c.nome}</option>`);
                });

            // Carregar Produtos em memória
            fetch('backend/api_produtos.php?acao=listar')
                .then(res => res.json())
                .then(dados => produtosGlobais = dados);

            // Carregar Serviços em memória
            fetch('backend/api_servicos.php?acao=listar')
                .then(res => res.json())
                .then(dados => servicosGlobais = dados);
                
            listarVendas();
        };

        // 2. MUDAR O DROPDOWN DEPENDENDO DO TIPO (PRODUTO OU SERVIÇO)
        function mudarTipo() {
            let tipo = document.getElementById('selectTipo').value;
            let selectItem = document.getElementById('selectItem');
            
            selectItem.innerHTML = '<option value="">Selecione um item</option>';
            selectItem.disabled = false;
            document.getElementById('valor_total').value = '';

            if (tipo === 'produto') {
                produtosGlobais.forEach(p => {
                    selectItem.innerHTML += `<option value="${p.id}" data-preco="${p.preco}">[Estoque: ${p.estoque}] ${p.nome} - R$${p.preco}</option>`;
                });
            } else if (tipo === 'servico') {
                servicosGlobais.forEach(s => {
                    selectItem.innerHTML += `<option value="${s.id}" data-preco="${s.preco_base}">${s.descricao} - R$${s.preco_base}</option>`;
                });
            } else {
                selectItem.disabled = true;
            }
        }

        // 3. CALCULAR O VALOR TOTAL AUTOMATICAMENTE
        function calcularTotal() {
            let selectItem = document.getElementById('selectItem');
            let qtd = document.getElementById('quantidade').value;
            
            if(selectItem.selectedIndex > 0) {
                let preco = selectItem.options[selectItem.selectedIndex].getAttribute('data-preco');
                let total = (parseFloat(preco) * parseInt(qtd)).toFixed(2);
                document.getElementById('valor_total').value = total;
            }
        }

        // 4. SALVAR A VENDA/OS
        document.getElementById('formVenda').addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);

            fetch('backend/api_vendas.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                alert(data.mensagem);
                if(data.status === 'sucesso') {
                    this.reset();
                    document.getElementById('selectItem').disabled = true;
                    listarVendas();
                    // Opcional: recarregar produtos para atualizar estoque visualmente
                    fetch('backend/api_produtos.php?acao=listar').then(res => res.json()).then(d => produtosGlobais = d);
                }
            });
        });

        // 5. LISTAR HISTÓRICO
        function listarVendas() {
            fetch('backend/api_vendas.php?acao=listar')
            .then(res => res.json())
            .then(vendas => {
                let lista = document.getElementById('listaVendas');
                lista.innerHTML = ''; 
                vendas.forEach(v => {
                    let itemNome = v.tipo === 'produto' ? v.produto_nome : v.servico_desc;
                    lista.innerHTML += `<li>
                        <strong>${v.data_registro}</strong> | Cliente: ${v.cliente_nome} <br>
                        ${v.tipo.toUpperCase()}: ${itemNome} (Qtd: ${v.quantidade}) - Total: <strong>R$ ${v.valor_total}</strong>
                    </li><br>`;
                });
            });
        }
    </script>
</body>
</html>
