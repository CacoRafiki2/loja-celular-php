<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Serviços</title>
</head>
<body>
    <h2>Gestão de Serviços de Manutenção</h2>
    
    <form id="formServico">
        <input type="hidden" name="acao" id="acao" value="cadastrar">
        <input type="hidden" name="id" id="servico_id" value="">
        
        <input type="text" name="descricao" id="descricao" placeholder="Descrição (Ex: Troca de Ecrã)" required><br><br>
        <input type="number" step="0.01" name="preco_base" id="preco_base" placeholder="Preço Base (Ex: 35.00)" required><br><br>
        
        <button type="submit" id="btnSalvar">Salvar Serviço</button>
        <button type="button" onclick="cancelarEdicao()" style="display:none;" id="btnCancelar">Cancelar Edição</button>
    </form>

    <hr>

    <h2>Lista de Serviços Disponíveis</h2>
    <ul id="listaServicos"></ul>

    <script>
        const form = document.getElementById('formServico');

        // FUNÇÃO: SALVAR (CADASTRAR OU EDITAR)
        form.addEventListener('submit', function(e) {
            e.preventDefault(); 
            let formData = new FormData(this);

            fetch('backend/api_servicos.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                alert(data.mensagem);
                if(data.status === 'sucesso') {
                    cancelarEdicao(); 
                    listarServicos();
                }
            });
        });

        // FUNÇÃO: LISTAR
        function listarServicos() {
            fetch('backend/api_servicos.php?acao=listar')
            .then(response => response.json())
            .then(servicos => {
                let lista = document.getElementById('listaServicos');
                lista.innerHTML = ''; 
                
                servicos.forEach(servico => {
                    let item = document.createElement('li');
                    item.innerHTML = `
                        <strong>${servico.descricao}</strong> - Preço Base: €${servico.preco_base}
                        <button onclick="prepararEdicao(${servico.id}, '${servico.descricao}', '${servico.preco_base}')">Editar</button>
                        <button onclick="excluirServico(${servico.id})">Excluir</button>
                    `;
                    lista.appendChild(item);
                });
            });
        }

        // FUNÇÃO: PREPARAR EDIÇÃO
        function prepararEdicao(id, descricao, preco_base) {
            document.getElementById('acao').value = 'editar';
            document.getElementById('servico_id').value = id;
            document.getElementById('descricao').value = descricao;
            document.getElementById('preco_base').value = preco_base;
            
            document.getElementById('btnSalvar').innerText = "Atualizar Serviço";
            document.getElementById('btnCancelar').style.display = "inline-block";
        }

        // FUNÇÃO: CANCELAR EDIÇÃO
        function cancelarEdicao() {
            form.reset();
            document.getElementById('acao').value = 'cadastrar';
            document.getElementById('servico_id').value = '';
            document.getElementById('btnSalvar').innerText = "Salvar Serviço";
            document.getElementById('btnCancelar').style.display = "none";
        }

        // FUNÇÃO: EXCLUIR
        function excluirServico(id) {
            if(confirm("Tem a certeza que deseja excluir este serviço?")) {
                let formData = new FormData();
                formData.append('acao', 'excluir');
                formData.append('id', id);

                fetch('backend/api_servicos.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.mensagem);
                    listarServicos();
                });
            }
        }

        // Carrega a lista ao abrir a página
        window.onload = listarServicos;
    </script>
</body>
</html>
