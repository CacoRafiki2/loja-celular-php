<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - TechStore</title>
    <style>
        /* --- ESTILOS GERAIS (CSS) --- */
        :root {
            --cor-primaria: #2c3e50;
            --cor-secundaria: #3498db;
            --cor-fundo: #f4f7f6;
            --cor-texto: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
        }

        /* MENU LATERAL */
        .sidebar {
            width: 250px;
            background-color: var(--cor-primaria);
            color: white;
            display: flex;
            flex-direction: column;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #455a64;
            padding-bottom: 15px;
        }

        .sidebar button {
            background: none;
            border: none;
            color: white;
            padding: 15px 20px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .sidebar button:hover, .sidebar button.ativo {
            background-color: var(--cor-secundaria);
            padding-left: 25px;
        }

        /* ÁREA DE CONTEÚDO */
        .conteudo-principal {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        /* Paineis (Abas) */
        .painel {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .painel.ativo {
            display: block;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilos para inputs e botões */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button[type="submit"], .btn-acao {
            background-color: var(--cor-secundaria);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }
        
        ul { list-style-type: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 15px; border-radius: 4px; line-height: 1.6; }
        li button { margin-left: 10px; padding: 5px 10px; cursor: pointer; }
	/* --- SISTEMA DE NOTIFICAÇÕES (TOAST) --- */
        .toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 15px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: opacity 0.4s, bottom 0.4s;
            opacity: 0;
        }

        .toast.mostrar {
            visibility: visible;
            opacity: 1;
            bottom: 40px;
        }

        .toast.sucesso { background-color: #27ae60; } /* Verde para sucesso */
        .toast.erro { background-color: #c0392b; } /* Vermelho para erro */
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📱 TechStore</h2>
        <button class="tab-btn ativo" onclick="abrirAba(event, 'abaVendas')">Vendas e OS</button>
        <button class="tab-btn" onclick="abrirAba(event, 'abaClientes')">Gestão de Clientes</button>
        <button class="tab-btn" onclick="abrirAba(event, 'abaProdutos')">Estoque de Produtos</button>
        <button class="tab-btn" onclick="abrirAba(event, 'abaServicos')">Catálogo de Serviços</button>
    </div>

    <div class="conteudo-principal">

        <div id="abaVendas" class="painel ativo">
            <h2>Ordem de Serviço / Vendas</h2>
            <form id="formVenda">
                <input type="hidden" name="acao" value="cadastrar">
                
                <label>Cliente:</label>
                <select name="cliente_id" id="selectCliente" required>
                    <option value="">Carregando clientes...</option>
                </select>

                <label>Tipo de Registro:</label>
                <select name="tipo" id="selectTipo" onchange="mudarTipo()" required>
                    <option value="">Selecione...</option>
                    <option value="produto">Venda de Produto</option>
                    <option value="servico">Ordem de Serviço (Manutenção)</option>
                </select>

                <label>Item (Produto ou Serviço):</label>
                <select name="item_id" id="selectItem" onchange="calcularTotal()" required disabled>
                    <option value="">Selecione o tipo primeiro</option>
                </select>

                <label>Quantidade:</label>
                <input type="number" name="quantidade" id="quantidade" value="1" min="1" onchange="calcularTotal()" required>

                <label>Valor Total (R$):</label>
                <input type="text" name="valor_total" id="valor_total" readonly required>

                <button type="submit">Registrar Venda / OS</button>
            </form>

            <hr style="margin: 30px 0;">
            <h2>Histórico de Registros</h2>
            <ul id="listaVendas"></ul>
        </div>

        <div id="abaClientes" class="painel">
            <h2>Gestão de Clientes</h2>
            <form id="formCliente">
                <input type="hidden" name="acao" value="cadastrar">
                <input type="hidden" name="id" value="">
                
                <input type="text" name="nome" placeholder="Nome Completo" required>
                <input type="text" name="cpf" placeholder="CPF" required>
                <input type="text" name="telefone" placeholder="Telefone" required>
                <input type="text" name="endereco" placeholder="Endereço">
                
                <button type="submit">Salvar Cliente</button>
                <button type="button" onclick="cancelarEdicaoCliente()" style="display:none;" id="btnCancelar">Cancelar Edição</button>
            </form>

            <hr style="margin: 30px 0;">
            <h2>Lista de Clientes</h2>
            <ul id="listaClientes"></ul>
        </div>

        <div id="abaProdutos" class="painel">
            <h2>Gestão de Produtos (Estoque)</h2>
            <form id="formProduto">
                <input type="hidden" name="acao" value="cadastrar">
                <input type="hidden" name="id" value="">
                
                <input type="text" name="nome" placeholder="Nome do Produto/Acessório" required>
                <input type="text" name="marca" placeholder="Marca">
                <input type="number" step="0.01" name="preco" placeholder="Preço (Ex: 150.00)" required>
                <input type="number" name="estoque" placeholder="Quantidade em Estoque" required>
                
                <button type="submit">Salvar Produto</button>
                <button type="button" onclick="cancelarEdicaoProduto()" style="display:none;" id="btnCancelar">Cancelar Edição</button>
            </form>

            <hr style="margin: 30px 0;">
            <h2>Lista de Produtos</h2>
            <ul id="listaProdutos"></ul>
        </div>

        <div id="abaServicos" class="painel">
            <h2>Gestão de Serviços de Manutenção</h2>
            <form id="formServico">
                <input type="hidden" name="acao" value="cadastrar">
                <input type="hidden" name="id" value="">
                
                <input type="text" name="descricao" placeholder="Descrição (Ex: Troca de Tela)" required>
                <input type="number" step="0.01" name="preco_base" placeholder="Preço Base (Ex: 35.00)" required>
                
                <button type="submit">Salvar Serviço</button>
                <button type="button" onclick="cancelarEdicaoServico()" style="display:none;" id="btnCancelar">Cancelar Edição</button>
            </form>

            <hr style="margin: 30px 0;">
            <h2>Lista de Serviços Disponíveis</h2>
            <ul id="listaServicos"></ul>
        </div>

    </div>

    <script src="js/main.js"></script>

<div id="notificacao" class="toast">Mensagem aqui</div>

    <script src="js/main.js"></script>
</body>
</html>
