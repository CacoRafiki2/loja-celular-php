<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Loja Celular</title>
    <style>
        /* Tira as margens padrão e usa Flexbox para dividir a tela */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; overflow: hidden; background-color: #f4f6f9; }
        
        /* Estilo do Menu Lateral (Sidebar) */
        .sidebar { width: 260px; background-color: #2c3e50; color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 10; }
        .sidebar h2 { text-align: center; padding: 25px 0; border-bottom: 1px solid #1a252f; margin: 0; font-size: 22px; background-color: #1a252f; }
        .sidebar p { text-align: center; font-size: 12px; color: #95a5a6; margin-bottom: 10px; }
        
        /* Estilo dos Botões do Menu */
        .sidebar a { padding: 18px 20px; color: #ecf0f1; text-decoration: none; border-bottom: 1px solid #34495e; transition: 0.3s; font-size: 15px; }
        .sidebar a:hover { background-color: #3498db; padding-left: 25px; /* Efeito de empurrar pro lado */ }
        
        /* Área Principal onde as páginas vão carregar */
        .content { flex: 1; display: flex; flex-direction: column; }
        
        /* O iframe que funciona como a "tela" do sistema */
        iframe { width: 100%; height: 100%; border: none; background-color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>📱 Loja Celular</h2>
        <p>Menu de Navegação</p>
        
        <a href="cadastro_cliente.html" target="tela_principal">👥 Gestão de Clientes</a>
        <a href="#" target="tela_principal">🛒 Vendas e OS</a>
        <a href="#" target="tela_principal">📦 Estoque de Produtos</a>
        <a href="#" target="tela_principal">📋 Catálogo de Serviços</a>
    </div>

    <div class="content">
        <iframe name="tela_principal" src="cadastro_cliente.html"></iframe>
    </div>

</body>
</html>
