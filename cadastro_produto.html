<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f6f9; }
        
        /* Novo estilo para alinhar o título e o botão lado a lado */
        .cabecalho { display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin: 0; }
        
        /* Estilo do botão de Listar */
        .btn-listar { background-color: #7f8c8d; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-listar:hover { background-color: #95a5a6; }

        form { max-width: 400px; padding: 25px; background-color: white; border: 1px solid #ecf0f1; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .linha-dupla { display: flex; gap: 15px; } 
        .coluna { flex: 1; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #34495e; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; padding: 12px 15px; background-color: #e67e22; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; transition: 0.3s; }
        button:hover { background-color: #d35400; }
    </style>
</head>
<body>

    <div class="cabecalho">
        <h2>📦 Novo Produto</h2>
        <a href="listar_produtos.php" class="btn-listar">📋 Listar Estoque</a>
    </div>
    
    <form action="inserir_produto.php" method="POST">
        <label for="nome">Nome do Produto:</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: Película de Vidro 3D" required>

        <label for="marca">Marca:</label>
        <input type="text" id="marca" name="marca" placeholder="Ex: Samsung" required>

        <div class="linha-dupla">
            <div class="coluna">
                <label for="preco">Preço Unitário (R$):</label>
                <input type="number" id="preco" name="preco" step="0.01" required>
            </div>
            <div class="coluna">
                <label for="estoque">Estoque (Qtd):</label>
                <input type="number" id="estoque" name="estoque" required>
            </div>
        </div>

        <button type="submit">Cadastrar Produto</button>
    </form>

</body>
</html>
